<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Book Search</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }
    input {
      width: 70%;
      padding: 10px;
      font-size: 16px;
    }
    button {
      padding: 10px 15px;
      font-size: 16px;
      margin-left: 5px;
    }
    .book {
      border-bottom: 1px solid #ddd;
      padding: 10px 0;
    }
    .pagination {
      margin-top: 20px;
    }
  </style>
</head>

    <h1>Book Search</h1>

    <input type="text" id="searchInput" placeholder="Search for books...">
    <button onclick="searchBooks()">Search</button>

    <div id="results"></div>

    <div class="pagination">
        <button onclick="prevPage()">⬅ Prev</button>
        <span id="pageInfo"></span>
        <button onclick="nextPage()">Next ➡</button>
    </div> 
  <h3>My Shelf</h3>
  <ul id="shelfList"></ul>


  <script>
    // You should store this after login
    const user = JSON.parse(localStorage.getItem("user"));
    const params = new URLSearchParams(window.location.search);
    const googleID = params.get("userId");

    
    async function addBook(book) {
      if (!book) {
        document.getElementById("status").innerText = "Enter a book ID";
        return;
      }
      const title = book.title
      const author = book.author_name
      const first_publish_year = book.first_publish_year
      const isbn = book.isbn
      const id = 420
      const res = await fetch("/api/shelf/add", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          id,
          isbn,
          title,
          author
        })
      });

      const data = await res.json();

      if (data.success) {
        document.getElementById("status").innerText = "Book added! 📘";
        loadShelf();
      } else {
        document.getElementById("status").innerText = "Book already exists or failed";
      }
    }

    async function loadShelf() {
      const res = await fetch(`/api/shelf/${googleID}`);
      const books = await res.json();

      const list = document.getElementById("shelfList");
      list.innerHTML = "";

      books.forEach(book => {
        const li = document.createElement("li");
        li.innerText = `${book.title} (${book.id})`;
        list.appendChild(li);
      });
    }

    // load on page start
    loadShelf();

    // openLib API paged retrival

    let currentPage = 1;
    let currentQuery = "";

    async function searchBooks(page = 1) {
      const query = document.getElementById("searchInput").value;
      if (!query) return;

      currentQuery = query;
      currentPage = page;

      const url = `https://openlibrary.org/search.json?q=${encodeURIComponent(query)}&page=${page}&fields=title,isbn,author_name,first_publish_year`;

      const res = await fetch(url);
      const data = await res.json();

      displayResults(data.docs);
      document.getElementById("pageInfo").innerText = `Page ${currentPage}`;
    }

    
    function displayResults(books) {
      const resultsDiv = document.getElementById("results");
      resultsDiv.innerHTML = "";

      books.forEach(book => {
        const div = document.createElement("div");
        div.className = "book";

        div.innerHTML = `
          <strong>${book.title}</strong><br>
          Author: ${book.author_name ? book.author_name.join(", ") : "Unknown"}<br>
          First Published: ${book.first_publish_year || "N/A"}
        `;


        const button = document.createElement("button");
        button.textContent = "Add Book";

        button.onclick = () => addBook(book);

        div.appendChild(button);

        resultsDiv.appendChild(div);
      });
    }

    function nextPage() {
      searchBooks(currentPage + 1);
    }

    function prevPage() {
      if (currentPage > 1) {
        searchBooks(currentPage - 1);
      }
    }

   
  </script>
</body>
</html>
