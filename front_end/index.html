<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <header>
        <a href="index.html">
            <img src="../images/bookLogo.png" alt="Company Logo" width="150">
          </a>
        <button id="login" class="login-btn">login</button>
    </header>
    <div class="body-text">
        <h1>Welcome to Bookshelf!</h1>
        <p>Your own personal bookshelf from anywhere</p>
    </div>
    <script>
    function parseJwt(token) {
      const base64Url = token.split('.')[1];
      const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
      return JSON.parse(atob(base64));
    }

    async function handleCredentialResponse(response) {
      console.log("Google ID token:", response.credential);

      const res = await fetch("/api/auth/google", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          token: response.credential
        })
      });

      const data = await res.json();
      console.log("Backend response:", data);

      if (data.user) {
        alert(`Welcome ${data.user.name} `);
        const payload = parseJwt(response.credential);
        const sub = payload.sub;
        window.location.href = `/shelf.html?userId=${sub}`;
        
      } else {
        alert("Login failed");
      }
    }

    window.onload = () => {
      google.accounts.id.initialize({
        client_id: "841358619520-cfdk2429j154d7h472v4as6tj533pk57.apps.googleusercontent.com",
        callback: handleCredentialResponse
      });
    };

    document.getElementById("login").addEventListener("click", () => {
      google.accounts.id.prompt();
    });
  </script>
</body>
</html>
