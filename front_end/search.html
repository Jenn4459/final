<!DOCTYPE html>
<html>
<head>
    <title>Search Books - Book Link</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <script src='scripts/addBooks.js'></script>
    <script src='scripts/searchBooks.js'></script>

    <header>
        <a href="index.html">
            <img src="../images/bookLogo.png" alt="Company Logo" width="150">
        </a>
        <nav>
            <a href="shelf.html" class="nav-link">My Shelf</a>
            <button id="login" class="login-btn">Login</button>
        </nav>
    </header>

    <main>
        <h1>Find New Books</h1>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search by title, author, or ISBN...">
            <button onclick="searchBooks()" class="search-btn">Search</button>
        </div>

        <div id="results" class="results-grid"></div>

        <div class="pagination">
            <button onclick="prevPage()">⬅ Prev</button>
            <span id="pageInfo"></span>
            <button onclick="nextPage()">Next ➡</button>
        </div> 

        <p id="status"></p>
    </main>

    <footer>
        <p>&copy; 2026 Book Link. All rights reserved. &trade;</p>
    </footer>
</body>
</html>
