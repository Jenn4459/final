<!DOCTYPE html>
<html>
<head>
  <title>My Shelf</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <header>
        <a href="index.html">
            <img src="../images/bookLogo.png" alt="Company Logo" width="150">
          </a>
        <button id="login" class="login-btn">login</button>
    </header>
  <h1>My Book Shelf</h1>

  <!-- Input -->
  <input id="bookIdInput" placeholder="Enter Book ID" />
  <button onclick="addBook()">Add Book</button>

  <p id="status"></p>

  <hr />

  <h3>My Shelf</h3>
  <ul id="shelfList"></ul>

  <script>
    // You should store this after login
    const user = JSON.parse(localStorage.getItem("user"));
    const params = new URLSearchParams(window.location.search);
    const googleID = params.get("userId");

    
    async function addBook() {
      const bookID = document.getElementById("bookIdInput").value;

      if (!bookID) {
        document.getElementById("status").innerText = "Enter a book ID";
        return;
      }

      const res = await fetch("/api/shelf/add", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          googleID,
          bookID
        })
      });

      const data = await res.json();

      if (data.success) {
        document.getElementById("status").innerText = "Book added! 📘";
        loadShelf();
      } else {
        document.getElementById("status").innerText = "Book already exists or failed";
      }
    }

    async function loadShelf() {
      const res = await fetch(`/api/shelf/${googleID}`);
      const books = await res.json();
    
      const grid = document.getElementById("shelfGrid"); // Match the new ID
      grid.innerHTML = "";
    
      books.forEach(book => {
        const card = document.createElement("div");
        card.className = "book-card";
        
        card.innerHTML = `
          <div class="book-icon" style="font-size: 40px;">📖</div>
          <h4>${book.title}</h4>
          <p>ID: ${book.id}</p>
        `;
        
        grid.appendChild(card);
      });
    }

    // load on page start
    loadShelf();
  </script>
</body>
</html>
