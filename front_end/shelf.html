<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Shelf - Book Link</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        
        nav {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        #login-stat {
            display: flex;
            align-items: center;
        }
        
        #profile {
            display: flex;
            align-items: center;
        }

        #profileImg {
            width: 75px;     
            height: auto;
            border-radius: 50%;
        }

        #profile #profileImg {
        border: none;
        outline: none;
        color: #a94e6f;
        background-color: inherit;
        font-family: inherit;
        margin: 0;
        }

        #profile-dropdown {
        display: none;
        position: absolute;
        background-color: #f9f9f9;
        min-width: 160px;
        box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
        z-index: 1;
        }

        #profile-dropdown a {
        float: none;
        color: #a94e6f;
        padding: 12px 16px;
        text-decoration: none;
        display: block;
        text-align: left;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html">
            <img src="images/bookLogo.png" alt="Book Link" width="140">
        </a>
        <nav>
            <a href="shelf.html" class="nav-link active">My Shelf</a>
            <a href="search.html" class="nav-link">Find Books</a>
            <div class="nav-divider"></div>
            <div id="login-stat">
                <button id="login" class="login-btn" style="display: none;">Login</button>
                <div id="profile" style="display: none;">
                    <img id="profileImg" src="" alt="Profile" onclick="toggleMenu()" width="35" style="border-radius: 50%;">
                    <div id="profile-dropdown" class="dropdown" style="display: none;">
                        <a href="shelf.html">My Shelf</a>
                        <a href="index.html" onclick="logout(); return false;">Logout</a>
                    </div>
                </div> 
            </div>
        </nav>
    </header>

    <main>
        <h1>My Shelf</h1>

        <div class="shelf-container">
            <ul id="shelfList"></ul>
        </div>

        <p id="status"></p>

        <hr>

        <h3>My Shelf</h3>
        <ul id="shelfList"></ul>
        <h4>My Profile</h4>
        <div id="averagePublishYear">Average Year of Publication</div>
    
        <div id="Top Generes">Top Generes</div>
        
    </main>

    <footer>
        <p>&copy; 2026 Book Link. All rights reserved. &trade;</p>
    </footer>

    <script src="scripts/addBooks.js"></script>
    <script src="scripts/utils.js"></script>

    <script>
        displayProfileIcon();
    </script>
</body>
</html>
