<!DOCTYPE html>
<html>
<head>
  <title>My Shelf</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <script src='scripts/addBooks.js'></script>
  <script src='scripts/searchBooks.js'></script>

  <header>
    <a href="index.html">
      <img src="../images/bookLogo.png" alt="Company Logo" width="150">
    </a>
    <button id="login" class="login-btn">login</button>
  </header>

  <main>
    <h1>My Book Shelf</h1>

    <input type="text" id="searchInput" placeholder="Search for books...">
    <button onclick="searchBooks()">Search</button>

    <div id="results"></div>

    <div class="pagination">
      <button onclick="prevPage()">⬅ Prev</button>
      <span id="pageInfo"></span>
      <button onclick="nextPage()">Next ➡</button>
    </div> 

    <p id="status"></p>

    <hr />

    <h3>My Shelf</h3>
    <ul id="shelfList"></ul>
  </main>

  <footer>
    <p>&copy; 2026 Book Link. All rights reserved. &trade;</p>
  </footer>
  
  <h4>My Profile</h4>
  <div id="averagePublishYear">Average Year of publication</div>

  <div id="Top Generes">Top Generes</div>
</body>
</html>
