<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Shelf - Book Link</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        main {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }
    
        h1 {
            margin-bottom: 20px;
        }
    
        .shelf-container {
            margin-bottom: 16px;
        }
    
        #shelfList {
            list-style: none;
            padding: 0;
        }
    
        #shelfList li {
            padding: 10px 0;
            border-bottom: 1px solid #f0ebe3;
        }
    
        hr {
            margin: 40px 0;
            border: none;
            border-top: 1px solid #e0d9d0;
        }
    
        h3 {
            margin-bottom: 16px;
        }
    
        #averagePublishYear {
            margin-bottom: 12px;
            color: #6b6060;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="index.html">
                <img src="images/bookLogo.png" alt="Book Link" width="140">
            </a>
            <a href="shelf.html" id="my-shelf" class="nav-link active">My Shelf</a>
            <a href="shelf.html" id="shelf" class="nav-link active">Shelf</a>
            <a href="search.html" id="find-books" class="nav-link">Find Books</a>
            <a href="search.html" id="find" class="nav-link">Find</a>
            <div class="nav-divider"></div>
            <div id="login-stat">
                <button id="login" class="login-btn" style="display: none;">Login</button>
                <div id="profile" style="display: none;">
                    <img id="profileImg" src="" alt="Profile" onclick="toggleMenu()" width="35" style="border-radius: 50%;">
                    <div id="profile-dropdown" class="dropdown" style="display: none;">
                        <a href="shelf.html">My Shelf</a>
                        <a href="index.html" onclick="logout(); return false;">Logout</a>
                    </div>
                </div> 
            </div>
        </nav>
    </header>

    <main>
        <h1>My Shelf</h1>

        <div class="shelf-container">
            <ul id="shelfList"></ul>
        </div>

        <p id="status"></p>

        <hr>

        <h3>My Profile</h3>
        <h4> Average Published Year of Books</h4>

        <div id="averagePublishYear"></div>
    
        <h3>Top Subjects </h3>
        <div id="subject"></div>
        
        <button onclick='getRecommendation()'>See Recommendations</button>
    </main>

    <footer>
        <p>&copy; 2026 Book Link. All rights reserved. &trade;</p>
    </footer>

    <script src="scripts/utils.js"></script>
    <script src="scripts/shelf.js"></script>
    <script src="scripts/addBooks.js"></script>
    <script src="scripts/rec.js"></script>

    <script>
        displayProfileIcon();
    </script>
</body>
</html>
