<!DOCTYPE html>
<html>
<head>
  <title>My Shelf</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <a href="index.html">
            <img src="/images/bookLogo.png" alt="Company Logo" width="150">
        </a>
        <button id="login" class="login-btn">Login</button>
    </header>

    <div class="container">
        <section class="add-book-section">
            <h2>Add to your collection</h2>
            <div class="input-group">
                <input id="bookIdInput" placeholder="Enter Google Books ID (e.g., zyTCAlS7f98C)" />
                <button onclick="addBook()" class="add-btn">Add Book</button>
            </div>
            <p id="status"></p>
        </section>

        <hr class="divider" />

        <section class="shelf-section">
            <h3>My Book Shelf</h3>
            <div id="shelfGrid" class="book-grid"></div>
        </section>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const googleID = params.get("userId");

        async function addBook() {
            const bookID = document.getElementById("bookIdInput").value;
            if (!bookID) {
                document.getElementById("status").innerText = "Enter a book ID";
                return;
            }

            const res = await fetch("/api/shelf/add", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ googleID, bookID })
            });

            const data = await res.json();
            if (data.success) {
                document.getElementById("status").innerText = "Book added! 📘";
                loadShelf();
            } else {
                document.getElementById("status").innerText = "Book already exists or failed";
            }
        }

        async function loadShelf() {
            if (!googleID) return;

            const res = await fetch(`/api/shelf/${googleID}`);
            const books = await res.json();

            const grid = document.getElementById("shelfGrid");
            grid.innerHTML = "";

            books.forEach(book => {
                const card = document.createElement("div");
                card.className = "book-card";
                card.innerHTML = `
                    <div style="font-size: 40px; margin-bottom: 10px;">📖</div>
                    <h4>${book.title}</h4>
                    <p style="color: #666; font-size: 0.8em;">ID: ${book.id}</p>
                `;
                grid.appendChild(card);
            });
        }

        loadShelf();
    </script>
</body>
</html>
